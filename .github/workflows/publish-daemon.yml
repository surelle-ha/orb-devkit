name: Publish Daemon to Crates.io

on:
  push:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: dtolnay/rust-toolchain@stable
    
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./
    
    - name: Verify version
      run: |
        TAG=${{ github.ref_name }}
        VERSION=$(grep "^version" Cargo.toml | head -1 | sed 's/.*"\([^"]*\)".*/\1/')
        if [ "$TAG" != "v$VERSION" ]; then
          echo "Tag version ($TAG) does not match Cargo.toml version (v$VERSION)"
          exit 1
        fi
    
    - name: Build
      run: cargo build --release
    
    - name: Test
      run: cargo test --release
    
    - name: Publish to crates.io
      run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Orb Daemon ${{ github.ref_name }}
        body: |
          Orb DevKit Daemon Release ${{ github.ref_name }}
          
          This daemon is now available on [crates.io](https://crates.io/crates/orb-daemon)
          
          ```
          cargo install orb-daemon
          ```
        draft: false
        prerelease: false
