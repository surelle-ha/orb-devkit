name: Build APK

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & sign APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Parse tag version ─────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          CODE=$(git rev-list --count HEAD)
          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "code=$CODE"       >> $GITHUB_OUTPUT
          echo "::notice::Building $TAG | versionName=$VERSION | versionCode=$CODE"

      # ── 3. Node.js + pnpm ────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Build Nuxt web assets ─────────────────────────────────────────
      - name: Build Nuxt
        run: pnpm generate
        env:
          NODE_ENV: production

      # ── 5. Capacitor sync ────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 6. Java / Android SDK ────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 7. Patch Java 17 sourceCompatibility ─────────────────────────────
      - name: Patch Java sourceCompatibility
        run: |
          python3 - << 'PYEOF'
          import re, pathlib, os

          COMPAT_BLOCK = """
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }"""

          def patch_build_gradle(path):
              p = pathlib.Path(path)
              if not p.exists():
                  print(f"  skip (not found): {path}")
                  return
              text = p.read_text()
              if "sourceCompatibility" in text:
                  print(f"  already patched: {path}")
                  return
              # Insert compileOptions block right after the first "android {" line
              patched = re.sub(
                  r'(android\s*\{)',
                  r'\1' + COMPAT_BLOCK,
                  text,
                  count=1
              )
              if patched == text:
                  print(f"  WARNING: no 'android {{' found in {path}")
              else:
                  p.write_text(patched)
                  print(f"  patched: {path}")

          # Patch all relevant build.gradle files
          targets = [
              "android/app/build.gradle",
              "android/capacitor-android/build.gradle",
          ]
          # Also find any other capacitor plugin build.gradle files
          for root, dirs, files in os.walk("android"):
              # skip .gradle cache dirs
              dirs[:] = [d for d in dirs if d not in ['.gradle', 'build', '.cxx']]
              for f in files:
                  if f == "build.gradle":
                      full = os.path.join(root, f)
                      if full not in targets:
                          targets.append(full)

          for t in targets:
              patch_build_gradle(t)
          PYEOF

      # ── 8. Patch versionCode / versionName ───────────────────────────────
      - name: Patch versionCode / versionName
        run: |
          python3 - << 'PYEOF'
          import re, pathlib

          p = pathlib.Path("android/app/build.gradle")
          text = p.read_text()
          text = re.sub(r'versionCode\s+\d+',    'versionCode ${{ steps.version.outputs.code }}',    text)
          text = re.sub(r'versionName\s+"[^"]*"', 'versionName "${{ steps.version.outputs.version }}"', text)
          p.write_text(text)
          print("versionCode / versionName patched")
          PYEOF

      # ── 9. Decode keystore ───────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/vorb-release.jks

      # ── 10. Build release APK ────────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/vorb-release.jks" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon \
            --stacktrace

      # ── 11. Rename APK ───────────────────────────────────────────────────
      - name: Rename APK
        run: |
          APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
          APK_DST="vorb-${{ steps.version.outputs.tag }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV

      # ── 12. Upload APK artifact ──────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: vorb-${{ steps.version.outputs.tag }}-apk
          path: ${{ env.APK_PATH }}
          retention-days: 90

      # ── 13. Create GitHub Release ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       "Orb Finance ${{ steps.version.outputs.tag }}"
          body: |
            ## Orb Finance ${{ steps.version.outputs.tag }}

            ### Install
            Download `vorb-${{ steps.version.outputs.tag }}.apk` below and sideload on your Android device.

            > **Enable unknown sources:** Settings → Security → Install unknown apps

            ### Build info
            - versionCode: `${{ steps.version.outputs.code }}`
            - versionName: `${{ steps.version.outputs.version }}`
            - Commit: `${{ github.sha }}`
          files:      ${{ env.APK_PATH }}
          draft:      false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}

      # ── 14. Build summary ────────────────────────────────────────────────
      - name: Job summary
        run: |
          echo "## ✅ Build complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| versionName | \`${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| versionCode | \`${{ steps.version.outputs.code }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| APK | \`${{ env.APK_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY